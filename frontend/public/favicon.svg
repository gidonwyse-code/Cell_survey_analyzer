<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- Subtle map grid -->
  <path d="M2 11 H30 M2 21 H30 M11 2 V30 M21 2 V30" stroke="#1e293b" stroke-width="0.8"/>

  <!-- Origin node (bottom-left, sky blue) -->
  <circle cx="8" cy="23" r="4" fill="#38BDF8"/>

  <!-- Destination node (top-right, violet) -->
  <circle cx="24" cy="9" r="4" fill="#A78BFA"/>

  <!-- Flow arrow from origin to destination -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#38BDF8"/>
    </marker>
  </defs>
  <line x1="12" y1="20" x2="19.5" y2="12.5"
        stroke="#38BDF8" stroke-width="2"
        marker-end="url(#arr)" stroke-linecap="round" opacity="0.9"/>
</svg>
